name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: true

      - run: vp run check

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: ['22']
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
          run-install: true

      - run: vp run build
      - run: vp run test
